<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BMW Price Predictor</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <h1>🚘 BMW Car Price Predictor</h1>

      <form id="predictForm">
        <input
          type="text"
          name="model"
          placeholder="Model (e.g., 3 Series)"
          required
        />
        <input
          type="number"
          name="year"
          placeholder="Year (e.g., 2018)"
          required
        />
        <input
          type="text"
          name="transmission"
          placeholder="Transmission (e.g., Manual)"
          required
        />
        <input
          type="number"
          name="mileage"
          placeholder="Mileage (e.g., 30000)"
          required
        />
        <input
          type="text"
          name="fuelType"
          placeholder="Fuel Type (e.g., Petrol)"
          required
        />
        <input
          type="number"
          name="tax"
          placeholder="Tax (e.g., 150)"
          required
        />
        <input
          type="number"
          name="engineSize"
          step="0.1"
          placeholder="Engine Size (e.g., 2.0)"
          required
        />
        <input
          type="number"
          name="mpg"
          step="0.1"
          placeholder="MPG (e.g., 45.6)"
          required
        />
        <button type="submit">Predict Price</button>
      </form>

      <div id="result"></div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
